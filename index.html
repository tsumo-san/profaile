<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Galaga Boss Game</title>

<style>
body{
margin:0;
background:black;
overflow:hidden;
font-family:sans-serif;
color:white;
}

canvas{
display:block;
margin:auto;
background:black;
}

#ui{
position:absolute;
top:10px;
left:10px;
font-size:18px;
}

#boss{
position:absolute;
top:40px;
left:10px;
font-size:18px;
color:red;
}
</style>

</head>

<body>

<div id="ui">
弾: <span id="ammo">10</span>
必殺: <span id="special">0</span>
</div>

<div id="boss">
ボスHP: <span id="bosshp">0</span>
</div>

<canvas id="game" width="800" height="600"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let player={x:400,y:550,speed:6}

let bullets=[]
let enemyBullets=[]
let enemies=[]
let items=[]

let boss=null

let ammo=10
let special=0
let kills=0
let gameOver=false

let keys={}

document.addEventListener("keydown",e=>{

keys[e.key]=true

if(e.key===" " && ammo>0){
shoot()
}

if(e.key==="z" && special>0){
useSpecial()
}

})

document.addEventListener("keyup",e=>{
keys[e.key]=false
})

function shoot(){

bullets.push({x:player.x,y:player.y})

ammo--

updateUI()

}

function useSpecial(){

special--

enemies=[]

enemyBullets=[]

if(boss){
boss.hp-=10
}

updateUI()

}

function spawnEnemy(){

let x=Math.random()*760+20

enemies.push({
x:x,
y:-20,
speed:2+Math.random()*2,
cooldown:Math.random()*120
})

}

function spawnBoss(){

boss={
x:400,
y:100,
hp:30,
cooldown:40,
dir:2
}

updateUI()

}

function spawnItem(x,y){

let r=Math.random()

if(r<0.4){
items.push({x,y,type:"ammo"})
}
else if(r<0.45){
items.push({x,y,type:"special"})
}

}

function update(){

if(gameOver)return

if(keys["ArrowLeft"]) player.x-=player.speed
if(keys["ArrowRight"]) player.x+=player.speed

player.x=Math.max(20,Math.min(780,player.x))

bullets.forEach((b,i)=>{
b.y-=8
if(b.y<0) bullets.splice(i,1)
})

enemyBullets.forEach((b,i)=>{

b.y+=5

if(b.y>600) enemyBullets.splice(i,1)

if(Math.abs(b.x-player.x)<15 && Math.abs(b.y-player.y)<15){
gameOver=true
}

})

enemies.forEach((e,ei)=>{

e.y+=e.speed
e.cooldown--

if(e.cooldown<=0){

enemyBullets.push({x:e.x,y:e.y})

e.cooldown=120

}

bullets.forEach((b,bi)=>{

if(Math.abs(b.x-e.x)<20 && Math.abs(b.y-e.y)<20){

spawnItem(e.x,e.y)

kills++

enemies.splice(ei,1)

bullets.splice(bi,1)

}

})

})

if(kills>=20 && !boss){

spawnBoss()

}

if(boss){

boss.x+=boss.dir

if(boss.x>750 || boss.x<50){
boss.dir*=-1
}

boss.cooldown--

if(boss.cooldown<=0){

enemyBullets.push({x:boss.x,y:boss.y})

enemyBullets.push({x:boss.x-30,y:boss.y})

enemyBullets.push({x:boss.x+30,y:boss.y})

boss.cooldown=30

}

bullets.forEach((b,bi)=>{

if(Math.abs(b.x-boss.x)<40 && Math.abs(b.y-boss.y)<40){

boss.hp--

bullets.splice(bi,1)

if(boss.hp<=0){

items.push({x:boss.x,y:boss.y,type:"special"})
items.push({x:boss.x,y:boss.y,type:"special"})

boss=null
kills=0

}

updateUI()

}

})

}

items.forEach((it,i)=>{

it.y+=2

if(Math.abs(it.x-player.x)<20 && Math.abs(it.y-player.y)<20){

if(it.type==="ammo") ammo+=5
if(it.type==="special") special++

items.splice(i,1)

updateUI()

}

})

if(Math.random()<0.02 && !boss){
spawnEnemy()
}

}

function draw(){

ctx.clearRect(0,0,800,600)

ctx.fillStyle="cyan"
ctx.fillRect(player.x-15,player.y-15,30,30)

ctx.fillStyle="yellow"
bullets.forEach(b=>{
ctx.fillRect(b.x-3,b.y-10,6,10)
})

ctx.fillStyle="red"
enemyBullets.forEach(b=>{
ctx.fillRect(b.x-3,b.y,6,10)
})

ctx.fillStyle="lime"
enemies.forEach(e=>{
ctx.fillRect(e.x-15,e.y-15,30,30)
})

items.forEach(it=>{

if(it.type==="ammo") ctx.fillStyle="blue"
else ctx.fillStyle="purple"

ctx.fillRect(it.x-8,it.y-8,16,16)

})

if(boss){

ctx.fillStyle="orange"

ctx.fillRect(boss.x-40,boss.y-20,80,40)

}

if(gameOver){

ctx.fillStyle="white"
ctx.font="40px sans-serif"
ctx.fillText("GAME OVER",300,300)

}

}

function updateUI(){

document.getElementById("ammo").textContent=ammo
document.getElementById("special").textContent=special
document.getElementById("bosshp").textContent=boss?boss.hp:0

}

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

loop()

</script>
</body>
</html>
