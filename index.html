<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>3D Aim Trainer</title>
<style>
body { margin:0; overflow:hidden; background:black; }
#ui{
    position:fixed;
    top:10px;
    left:10px;
    color:white;
    font-family:sans-serif;
}
</style>
</head>
<body>

<div id="ui">
    スコア: <span id="score">0</span><br>
    クリックで射撃
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

camera.position.z = 5;

let score = 0;
let raycaster = new THREE.Raycaster();
let mouse = new THREE.Vector2();

let targets = [];

function spawnTarget(){
    let geometry = new THREE.SphereGeometry(0.5, 32, 32);
    let material = new THREE.MeshBasicMaterial({color: 0xff0000});
    let sphere = new THREE.Mesh(geometry, material);

    sphere.position.x = (Math.random() - 0.5) * 8;
    sphere.position.y = (Math.random() - 0.5) * 5;
    sphere.position.z = - (Math.random() * 5);

    scene.add(sphere);
    targets.push(sphere);
}

spawnTarget();

window.addEventListener("click", function(event){
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = - (event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    let intersects = raycaster.intersectObjects(targets);

    if(intersects.length > 0){
        scene.remove(intersects[0].object);
        targets.splice(targets.indexOf(intersects[0].object),1);
        score++;
        document.getElementById("score").textContent = score;
        spawnTarget();
    }
});

function animate(){
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
}
animate();
</script>

</body>
</html>
