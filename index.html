塚本
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tsukamoto | Profile</title>

<style>
body{
    margin:0;
    padding:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background: rgba(0,0,0,0.6);
    padding:40px;
    border-radius:20px;
    text-align:center;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 25px rgba(0,0,0,0.8);
    width:350px;
}

h1{
    font-size:2.5em;
    margin-bottom:10px;
    letter-spacing:2px;
}

.subtitle{
    font-size:1.2em;
    opacity:0.8;
    margin-bottom:20px;
}

.line{
    width:60px;
    height:3px;
    background:#00f2ff;
    margin:15px auto;
    border-radius:5px;
}

p{
    font-size:1em;
    line-height:1.6em;
}

button{
    margin-top:20px;
    padding:10px 20px;
    border:none;
    border-radius:30px;
    background:#00f2ff;
    color:black;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:white;
    transform:scale(1.1);
}
</style>
</head>

<body>

<div class="card">
    <h1>TSUKAMOTO</h1>
    <div class="line"></div>
    <div class="subtitle">Web Learner / Student</div>
    <p>
        はじめまして、塚本です。<br>
        新しいことに挑戦するのが好きです。<br>
        HTMLやプログラミングを勉強中。
    </p>
    <button onclick="alert('よろしくお願いします！')">CLICK</button>
</div>

</body>
</html>
