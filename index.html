<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tsukamoto | Profile</title>

<style>
body{
    margin:0;
    padding:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#141E30,#243B55);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background: rgba(0,0,0,0.65);
    padding:40px;
    border-radius:25px;
    text-align:center;
    backdrop-filter: blur(12px);
    box-shadow: 0 0 40px rgba(0,0,0,0.8);
    width:380px;
    transition:0.4s;
}

.card:hover{
    transform: translateY(-10px);
}

h1{
    font-size:2.5em;
    letter-spacing:3px;
    margin-bottom:5px;
}

.subtitle{
    font-size:1.1em;
    opacity:0.8;
    margin-bottom:15px;
}

.line{
    width:70px;
    height:3px;
    background:#ffcc70;
    margin:15px auto;
    border-radius:5px;
}

p{
    font-size:1em;
    line-height:1.7em;
}

.hobby{
    margin-top:15px;
    font-size:1em;
}

.hobby span{
    display:inline-block;
    margin:5px 10px;
    padding:5px 12px;
    border-radius:20px;
    background:#ffcc70;
    color:black;
    font-weight:bold;
}

button{
    margin-top:20px;
    padding:10px 20px;
    border:none;
    border-radius:30px;
    background:#ffcc70;
    color:black;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:white;
    transform:scale(1.1);
}
</style>
</head>

<body>

<div class="card">
    <h1>TSUKAMOTO</h1>
    <div class="subtitle">Creative Student</div>
    <div class="line"></div>

    <p>
        はじめまして、塚本です。<br>
        料理と香水が好きで、<br>
        香りや味のバランスを楽しんでいます。
    </p>

    <div class="hobby">
        <span>🍳 Cooking</span>
        <span>🌿 Fragrance</span>
    </div>

    <button onclick="alert('香りも味も大切にしています。')">
        My Style
    </button>
</div>

</body>
</html>
