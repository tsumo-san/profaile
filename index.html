<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Simple Aim Trainer</title>
<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:sans-serif;
    text-align:center;
    overflow:hidden;
}

#game{
    position:relative;
    width:100vw;
    height:90vh;
    cursor:crosshair;
}

.target{
    position:absolute;
    width:50px;
    height:50px;
    background:red;
    border-radius:50%;
}

#ui{
    height:10vh;
    display:flex;
    justify-content:space-around;
    align-items:center;
    font-size:18px;
}
</style>
</head>
<body>

<h1>🎯 AIM TRAINER</h1>

<div id="game"></div>

<div id="ui">
    <div>時間: <span id="time">30</span></div>
    <div>スコア: <span id="score">0</span></div>
    <div>命中率: <span id="accuracy">0%</span></div>
</div>

<script>
let score = 0;
let shots = 0;
let hits = 0;
let time = 30;
let gameArea = document.getElementById("game");
let timer;

function spawnTarget(){
    let target = document.createElement("div");
    target.classList.add("target");

    let x = Math.random() * (window.innerWidth - 60);
    let y = Math.random() * (window.innerHeight * 0.9 - 60);

    target.style.left = x + "px";
    target.style.top = y + "px";

    target.onclick = function(e){
        e.stopPropagation();
        hits++;
        score++;
        updateUI();
        target.remove();
        spawnTarget();
    }

    gameArea.appendChild(target);
}

gameArea.addEventListener("click", function(){
    shots++;
    updateUI();
});

function updateUI(){
    document.getElementById("score").textContent = score;
    let acc = shots === 0 ? 0 : Math.floor((hits / shots) * 100);
    document.getElementById("accuracy").textContent = acc + "%";
}

function startGame(){
    spawnTarget();
    timer = setInterval(function(){
        time--;
        document.getElementById("time").textContent = time;
        if(time <= 0){
            clearInterval(timer);
            alert("終了！ スコア: " + score);
            location.reload();
        }
    },1000);
}

startGame();
</script>

</body>
</html>
