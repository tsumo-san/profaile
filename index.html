<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Galaga Drop System</title>
<style>
body{margin:0;background:black;color:white;text-align:center;font-family:sans-serif}
canvas{background:#000;display:block;margin:auto}
</style>
</head>
<body>

<h2>🚀 ギャラガ改</h2>
<p>← → 移動 / Space 攻撃 / Z 必殺</p>
<p>
スコア: <span id="score">0</span> |
弾レベル: <span id="level">1</span> |
必殺: <span id="special">0</span>
</p>

<canvas id="game" width="600" height="500"></canvas>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let score=0;
let bulletLevel=1;
let special=0;

let player={x:280,y:450,w:40,h:20,speed:6};

let bullets=[];
let enemyBullets=[];
let enemies=[];
let items=[];

let enemyDir=1;

for(let i=0;i<8;i++){
for(let j=0;j<3;j++){
enemies.push({x:60+i*60,y:40+j*40,w:30,h:20,alive:true});
}
}

let keys={};

document.addEventListener("keydown",e=>{
keys[e.code]=true;

if(e.code==="Space")shoot();
if(e.code==="KeyZ")specialAttack();
});

document.addEventListener("keyup",e=>keys[e.code]=false);

function shoot(){

if(bulletLevel===1)
bullets.push({x:player.x+18,y:player.y});

if(bulletLevel===2){
bullets.push({x:player.x+5,y:player.y});
bullets.push({x:player.x+30,y:player.y});
}

if(bulletLevel>=3){
bullets.push({x:player.x,y:player.y});
bullets.push({x:player.x+18,y:player.y});
bullets.push({x:player.x+36,y:player.y});
}

}

function specialAttack(){

if(special<=0)return;

enemies.forEach(e=>e.alive=false);
special--;

}

function enemyShoot(){

let alive=enemies.filter(e=>e.alive);
if(alive.length===0)return;

let shooter=alive[Math.floor(Math.random()*alive.length)];

enemyBullets.push({x:shooter.x+15,y:shooter.y});

}

setInterval(enemyShoot,1000);

function spawnItem(x,y){

let r=Math.random();

if(r<0.05){

items.push({x:x,y:y,type:"special"});

}else if(r<0.25){

items.push({x:x,y:y,type:"bullet"});

}

}

function update(){

if(keys["ArrowLeft"])player.x-=player.speed;
if(keys["ArrowRight"])player.x+=player.speed;

bullets.forEach(b=>b.y-=8);
enemyBullets.forEach(b=>b.y+=4);
items.forEach(i=>i.y+=2);

let edge=false;

enemies.forEach(e=>{

if(!e.alive)return;

e.x+=enemyDir*1.5;

if(e.x<0||e.x>560)edge=true;

});

if(edge){

enemyDir*=-1;

enemies.forEach(e=>e.y+=20);

}

bullets.forEach(b=>{

enemies.forEach(e=>{

if(!e.alive)return;

if(
b.x<e.x+e.w &&
b.x>e.x &&
b.y<e.y+e.h &&
b.y>e.y
){

e.alive=false;
score+=10;

spawnItem(e.x,e.y);

}

});

});

enemyBullets.forEach(b=>{

if(
b.x<player.x+player.w &&
b.x>player.x &&
b.y<player.y+player.h &&
b.y>player.y
){

alert("ゲームオーバー\nスコア:"+score);
location.reload();

}

});

items.forEach(i=>{

if(
i.x<player.x+player.w &&
i.x>player.x &&
i.y<player.y+player.h &&
i.y>player.y
){

if(i.type==="bullet")bulletLevel++;

if(i.type==="special")special++;

i.y=600;

}

});

document.getElementById("score").textContent=score;
document.getElementById("level").textContent=bulletLevel;
document.getElementById("special").textContent=special;

}

function draw(){

ctx.clearRect(0,0,600,500);

ctx.fillStyle="cyan";
ctx.fillRect(player.x,player.y,player.w,player.h);

ctx.fillStyle="yellow";
bullets.forEach(b=>ctx.fillRect(b.x,b.y,4,10));

ctx.fillStyle="orange";
enemyBullets.forEach(b=>ctx.fillRect(b.x,b.y,4,10));

ctx.fillStyle="red";
enemies.forEach(e=>{
if(e.alive)ctx.fillRect(e.x,e.y,e.w,e.h);
});

items.forEach(i=>{

if(i.type==="bullet")ctx.fillStyle="lime";
if(i.type==="special")ctx.fillStyle="purple";

ctx.fillRect(i.x,i.y,10,10);

});

}

function gameLoop(){

update();
draw();
requestAnimationFrame(gameLoop);

}

gameLoop();

</script>

</body>
</html>
